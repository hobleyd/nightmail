name: nightmail-release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs

      - run: flutter test

  prepare:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=${VERSION_FULL%%+*}" >> $GITHUB_OUTPUT

      - name: Push version tag
        uses: EndBug/latest-tag@latest
        with:
          tag-name: ${{ steps.version.outputs.version }}

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos .
      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build macos --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Create DMG
        uses: lethja/create-dmg-action@v0.0.2
        with:
          name: 'nightmail'
          srcdir: 'build/macos/Build/Products/Release/nightmail.app'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'nightmail.dmg'

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: choco install innosetup --no-progress -y
      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build windows --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}
      - run: dart run windows.dart
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'build/windows/nightmail-${{ needs.prepare.outputs.version }}.exe'

  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Add WPE WebKit PPA
        run: |
          curl -fsSL \
            https://hobleyd.github.io/wpe-webkit-linux/wpe-webkit-linux.gpg \
            | sudo gpg --dearmor \
              -o /usr/share/keyrings/wpe-webkit-linux.gpg
          echo "deb [signed-by=/usr/share/keyrings/wpe-webkit-linux.gpg] \
            https://hobleyd.github.io/wpe-webkit-linux/apt noble main" \
            | sudo tee /etc/apt/sources.list.d/wpe-webkit-linux.list

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl git unzip xz-utils python3 jq \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libwebkit2gtk-4.1-dev \
            libsecret-1-dev libjson-glib-dev libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libwpe-1.0-dev libwpebackend-fdo-1.0-dev libwpewebkit-1.0-dev \
            binutils coreutils desktop-file-utils fakeroot patchelf util-linux imagemagick

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false

      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build linux --release --no-tree-shake-icons

      - name: Prepare bundle assets
        run: convert assets/logo.png -resize 512x512 build/linux/x64/release/bundle/nightmail.png

      - name: Bundle WPE WebKit libraries
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          PROCESSED=$(mktemp -d)

          ensure_soname_symlink() {
            local lib=$1 name soname
            name=$(basename "$lib")
            soname=$(objdump -p "$lib" 2>/dev/null | awk '/SONAME/ {print $2}')
            if [ -n "$soname" ] && [ "$soname" != "$name" ] && [ ! -e "$BUNDLE_LIB/$soname" ]; then
              echo "  Symlink $soname -> $name"
              ln -s "$name" "$BUNDLE_LIB/$soname"
            fi
          }

          # Recursively bundle a library and its transitive deps.
          # Skips glibc component libs (must come from the host).
          bundle_with_deps() {
            local src=$1 name
            name=$(basename "$src")
            [ -f "$PROCESSED/$name" ] && return
            touch "$PROCESSED/$name"
            case "$name" in
              libc.so* | libm.so* | libpthread.so* | libdl.so* | librt.so* \
              | ld-linux* | libgcc_s* | libresolv.so* | libnss_*.so* ) return ;;
            esac
            if [ ! -f "$BUNDLE_LIB/$name" ]; then
              echo "  Bundling $name"
              cp "$src" "$BUNDLE_LIB/" 2>/dev/null || return
            fi
            ensure_soname_symlink "$BUNDLE_LIB/$name"
            ldd "$src" 2>/dev/null | awk '/=> \// { print $3 }' | while read dep; do
              bundle_with_deps "$dep"
            done
          }

          # WPEWebKit 2.0 and WPE backend libs from our PPA — not in Ubuntu 24.04
          # so they must be bundled.  Built with -D_FORTIFY_SOURCE=2 so they only
          # require glibc 2.39, which is what Ubuntu 24.04 and the snap base provide.
          find /usr/lib/x86_64-linux-gnu \
            \( -name "libWPEWebKit-2.0*.so*" \
               -o -name "libWPEBackend-fdo*.so*" \) \
            -type f 2>/dev/null | while read lib; do
            bundle_with_deps "$lib"
          done
          rm -rf "$PROCESSED"

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap package
        run: |
          sed -i "s/^version: .*/version: '${{ needs.prepare.outputs.version }}'/" snap/snapcraft.yaml
          snapcraft --destructive-mode

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'nightmail_${{ needs.prepare.outputs.version }}_amd64.snap'

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons

      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Decode keystore
        env:
          ENCODED_STRING: ${{ secrets.KEY_BASE_64 }}
        run: printf '%s' "$ENCODED_STRING" | base64 -di > android/app/keystore.jks

      - run: flutter build apk --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'build/app/outputs/apk/release/nightmail-${{ needs.prepare.outputs.version }}-release.apk'
          generate_release_notes: true
