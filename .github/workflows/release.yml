name: nightmail-release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs

      - run: flutter test

  prepare:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=${VERSION_FULL%%+*}" >> $GITHUB_OUTPUT

      - name: Push version tag
        uses: EndBug/latest-tag@latest
        with:
          tag-name: ${{ steps.version.outputs.version }}

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build macos --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Create DMG
        uses: lethja/create-dmg-action@v0.0.2
        with:
          name: 'nightmail'
          srcdir: 'build/macos/Build/Products/Release/nightmail.app'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'nightmail.dmg'

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: choco install innosetup --no-progress -y
      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build windows --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}
      - run: dart run windows.dart
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'build/windows/nightmail-${{ needs.prepare.outputs.version }}.exe'

  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    container:
      image: debian:sid
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y \
            curl git unzip xz-utils python3 jq \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libwebkit2gtk-4.1-dev \
            libsecret-1-dev libjson-glib-dev libgdk-pixbuf-2.0-dev \
            libwpewebkit-2.0-dev libwpe-1.0-dev libwpebackend-fdo-1.0-dev \
            libepoxy-dev libwayland-dev \
            binutils coreutils desktop-file-utils fakeroot patchelf util-linux imagemagick

      - name: Mark all directories as git-safe (root in container vs runner ownership)
        run: git config --global --add safe.directory '*'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false

      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: flutter pub get

      - name: Patch flutter_inappwebview_linux CMakeLists (GCC compat)
        run: |
          python3 - <<'EOF'
          import pathlib
          p = pathlib.Path.home() / '.pub-cache/hosted/pub.dev/flutter_inappwebview_linux-0.1.0-beta.1/linux/CMakeLists.txt'
          t = p.read_text()
          if 'find_and_add_library("libWPEWebKit-2.0"' in t:
            t = t.replace(
              'find_and_add_library("libWPEWebKit-2.0" "${WPE_LIB_DIRS}" WPE_BUNDLED_LIBS)',
              'list(GET WPE_WEBKIT_LIBRARIES 0 _wpe_webkit_libname)\nfind_and_add_library("lib${_wpe_webkit_libname}" "${WPE_LIB_DIRS}" WPE_BUNDLED_LIBS)'
            )
          CHECK_BLOCK = (
            'check_cxx_compiler_flag("-Wno-deprecated-literal-operator" _WNO_DEPRECATED_LITERAL_OP)\n'
            'if(_WNO_DEPRECATED_LITERAL_OP)\n'
            '  set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-deprecated-literal-operator")\n'
            'endif()'
          )
          if 'check_cxx_compiler_flag("-Wno-deprecated-literal-operator"' not in t:
            t = t.replace(
              'if(CMAKE_CXX_COMPILER_ID MATCHES "Clang")\n  set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-deprecated-literal-operator")\nendif()',
              CHECK_BLOCK
            )
            t = t.replace(
              'set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -Wno-deprecated-literal-operator")',
              CHECK_BLOCK
            )
          p.write_text(t)
          EOF

      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build linux --release --no-tree-shake-icons

      - name: Prepare bundle assets
        run: convert assets/logo.png -resize 512x512 build/linux/x64/release/bundle/nightmail.png

      - name: Copy missing libs into bundle
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          copy_if_missing() {
            local lib=$1
            local found=$(find /usr/lib/x86_64-linux-gnu /usr/lib -name "$lib" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "Copying $found"
              cp "$found" "$BUNDLE_LIB/"
            else
              echo "WARNING: $lib not found on host"
            fi
          }
          ldd build/linux/x64/release/bundle/nightmail \
            | grep "not found" \
            | awk '{print $1}' \
            | while read lib; do copy_if_missing "$lib"; done
          for solib in "$BUNDLE_LIB"/*.so*; do
            ldd "$solib" 2>/dev/null \
              | grep "not found" \
              | awk '{print $1}' \
              | while read lib; do copy_if_missing "$lib"; done
          done

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

  snap-linux:
    needs: [prepare, build-linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap package
        run: |
          sed -i "s/^version: .*/version: '${{ needs.prepare.outputs.version }}'/" snap/snapcraft.yaml
          snapcraft --destructive-mode

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'nightmail_${{ needs.prepare.outputs.version }}_amd64.snap'

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false

      - run: flutter pub get

      - name: Patch desktop_drop compileSdk (0.4.4 hardcodes 33, needs 34+)
        run: sed -i 's/compileSdk 33/compileSdk 36/' ~/.pub-cache/hosted/pub.dev/desktop_drop-0.4.4/android/build.gradle

      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Generate code for enough_mail sub-package
        working-directory: packages/enough_mail
        run: dart pub get && dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons

      - name: Create key.properties
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Decode keystore
        env:
          ENCODED_STRING: ${{ secrets.KEY_BASE_64 }}
        run: printf '%s' "$ENCODED_STRING" | base64 -di > android/app/keystore.jks

      - run: flutter build apk --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'nightmail-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: 'build/app/outputs/apk/release/nightmail-${{ needs.prepare.outputs.version }}-release.apk'
          generate_release_notes: true
