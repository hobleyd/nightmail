<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --fg: #1a1a1a;
  --toolbar-bg: #f5f5f5;
  --toolbar-border: #d8d8d8;
  --btn-hover: #e4e4e4;
  --btn-active: #d0d0d0;
  --placeholder: #aaaaaa;
  --link: #0066cc;
  --quote-border: #c0c0c0;
  --quote-fg: #666666;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1e;
    --fg: #e2e2e2;
    --toolbar-bg: #282828;
    --toolbar-border: #3a3a3a;
    --btn-hover: #363636;
    --btn-active: #464646;
    --placeholder: #666666;
    --link: #6699ff;
    --quote-border: #444444;
    --quote-fg: #888888;
  }
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
}

body { display: flex; flex-direction: column; }

.toolbar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 1px;
  padding: 4px 8px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--toolbar-border);
  flex-shrink: 0;
  user-select: none;
}

.toolbar button {
  background: none;
  border: none;
  border-radius: 4px;
  padding: 0 7px;
  cursor: pointer;
  font-size: 12px;
  color: var(--fg);
  height: 26px;
  min-width: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.toolbar button:hover { background: var(--btn-hover); }
.toolbar button:active { background: var(--btn-active); }
.toolbar button.active { background: var(--btn-active); }

/* colour button: stacked A + swatch bar */
#btn-color {
  flex-direction: column;
  gap: 2px;
  padding: 2px 7px;
}
#btn-color .color-letter {
  font-size: 12px;
  font-weight: bold;
  line-height: 1;
}
#btn-color .color-swatch {
  width: 14px;
  height: 3px;
  border-radius: 1px;
  background: #cc0000;
}

.sep {
  width: 1px;
  height: 16px;
  background: var(--toolbar-border);
  margin: 0 4px;
  flex-shrink: 0;
}

.toolbar select {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--toolbar-border);
  border-radius: 4px;
  height: 26px;
  font-size: 12px;
  padding: 0 2px;
}

.editor.format-painter-active {
  cursor: crosshair;
}

#btn-format-painter {
  font-size: 20px;
  -webkit-text-stroke: 0.4px currentColor;
}

.editor {
  flex: 1;
  padding: 12px 16px;
  outline: none;
  overflow-y: auto;
  word-wrap: break-word;
  color: var(--fg);
  background: var(--bg);
}

.editor:empty::before {
  content: attr(data-placeholder);
  color: var(--placeholder);
  pointer-events: none;
  display: block;
}

.editor a { color: var(--link); }

.editor blockquote {
  border-left: 3px solid var(--quote-border);
  margin: 4px 0 4px 0;
  padding-left: 12px;
  color: var(--quote-fg);
}

.editor img { max-width: 100%; height: auto; }

.editor ul, .editor ol { padding-left: 1.5em; }
</style>
</head>
<body>
<div class="toolbar" id="toolbar">
  <button title="Format Painter — copy formatting, then apply it to the next selection" id="btn-format-painter" onmousedown="event.preventDefault(); toggleFormatPainter()">&#x1F58C;</button>
  <span class="sep"></span>
  <button title="Bold" id="btn-bold" onmousedown="event.preventDefault(); fmt('bold')"><b>B</b></button>
  <button title="Italic" id="btn-italic" onmousedown="event.preventDefault(); fmt('italic')"><i>I</i></button>
  <button title="Underline" id="btn-underline" onmousedown="event.preventDefault(); fmt('underline')"><u>U</u></button>
  <button title="Strikethrough" id="btn-strike" onmousedown="event.preventDefault(); fmt('strikeThrough')"><s>S</s></button>
  <span class="sep"></span>
  <button id="btn-color" title="Font colour" onmousedown="event.preventDefault()" onclick="openColorPicker()">
    <span class="color-letter">A</span>
    <span class="color-swatch" id="color-swatch"></span>
  </button>
  <span class="sep"></span>
  <select id="font-size-select" title="Font size">
    <option value="">Size</option>
    <option value="10">10</option>
    <option value="12">12</option>
    <option value="14">14</option>
    <option value="16">16</option>
    <option value="18">18</option>
    <option value="20">20</option>
    <option value="24">24</option>
    <option value="28">28</option>
    <option value="32">32</option>
    <option value="36">36</option>
    <option value="48">48</option>
  </select>
  <span class="sep"></span>
  <button title="Bullet list" onmousedown="event.preventDefault(); fmt('insertUnorderedList')">&#x2022;&#x2261;</button>
  <button title="Numbered list" onmousedown="event.preventDefault(); fmt('insertOrderedList')">1&#x2261;</button>
  <span class="sep"></span>
  <button title="Decrease indent" onmousedown="event.preventDefault(); fmt('outdent')">&#x21E4;</button>
  <button title="Increase indent" onmousedown="event.preventDefault(); fmt('indent')">&#x21E5;</button>
  <span class="sep"></span>
  <button title="Insert link" onmousedown="event.preventDefault(); requestLink()">&#x1F517;</button>
  <button title="Remove formatting" onmousedown="event.preventDefault(); fmt('removeFormat')">&#x2715;</button>
  <button title="Attach file" style="margin-left:auto" onmousedown="event.preventDefault(); requestAttach()">&#x1F4CE;</button>
</div>
<input type="color" id="color-input" style="position:fixed; opacity:0; width:0; height:0; pointer-events:none;" value="#cc0000">
<div class="editor" id="editor" contenteditable="true" spellcheck="true" data-placeholder="Write your message here…"></div>

<script>
const editor = document.getElementById('editor');
const colorInput = document.getElementById('color-input');
const colorSwatch = document.getElementById('color-swatch');
let changeTimer = null;

// Initialise swatch to match the input's default value
colorSwatch.style.background = colorInput.value;

function fmt(cmd) {
  document.execCommand(cmd, false, null);
  editor.focus();
  scheduleChange();
}

function _flutterNotify(name, value) {
  if (window.flutter_inappwebview) {
    window.flutter_inappwebview.callHandler(name, value);
  } else if (window[name]) {
    window[name].postMessage(value !== undefined ? String(value) : '');
  }
}

function openColorPicker() {
  colorInput.click();
}

colorInput.addEventListener('input', function(e) {
  const color = e.target.value;
  colorSwatch.style.background = color;
  editor.focus();
  document.execCommand('foreColor', false, color);
  scheduleChange();
});
// --- Font size -------------------------------------------------------------
// execCommand has no direct way to set an arbitrary pixel font size, so we
// use the legacy 1-7 'fontSize' command with the out-of-range value 7 as a
// marker: it always wraps the affected content (or, for a collapsed
// selection, an empty node at the caret so future typing inherits it) in a
// single predictable <font size="7"> element that we then rewrite in place.
const fontSizeSelect = document.getElementById('font-size-select');

function setFontSize(px) {
  document.execCommand('fontSize', false, '7');
  editor.querySelectorAll('font[size="7"]').forEach(function(f) {
    f.removeAttribute('size');
    f.style.fontSize = px + 'px';
  });
  scheduleChange();
}

function restoreSavedSelection() {
  editor.focus();
  if (savedRange && _rangeInEditor(savedRange)) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }
}

// The <select> steals focus (and with it, the editor's selection) the moment
// it's opened, so the caret/range must be captured beforehand and restored
// before applying the size.
fontSizeSelect.addEventListener('mousedown', function() {
  saveSelection();
});
fontSizeSelect.addEventListener('change', function() {
  const px = this.value;
  restoreSavedSelection();
  if (px) setFontSize(px);
  this.blur();
});

function updateFontSizeSelect() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return;
  let node = sel.getRangeAt(0).startContainer;
  if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
  if (!node || !editor.contains(node)) return;
  const size = Math.round(parseFloat(getComputedStyle(node).fontSize));
  const match = Array.from(fontSizeSelect.options)
      .find(function(o) { return parseInt(o.value, 10) === size; });
  fontSizeSelect.value = match ? match.value : '';
}

// --- Format painter ----------------------------------------------------
// Captures the formatting of the current selection, then applies it to
// whatever the user selects next (one shot), like the "format painter" tool
// in desktop word processors.
let paintedFormat = null;

function toggleFormatPainter() {
  if (paintedFormat) {
    cancelFormatPainter();
    return;
  }
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;
  let node = sel.getRangeAt(0).startContainer;
  if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
  if (!node) return;

  const cs = getComputedStyle(node);
  paintedFormat = {
    bold: parseInt(cs.fontWeight, 10) >= 600,
    italic: cs.fontStyle === 'italic',
    underline: cs.textDecorationLine.indexOf('underline') !== -1,
    strike: cs.textDecorationLine.indexOf('line-through') !== -1,
    color: cssColorToHex(cs.color),
    fontSize: Math.round(parseFloat(cs.fontSize)),
  };
  document.getElementById('btn-format-painter').classList.add('active');
  editor.classList.add('format-painter-active');
}

function cancelFormatPainter() {
  paintedFormat = null;
  document.getElementById('btn-format-painter').classList.remove('active');
  editor.classList.remove('format-painter-active');
}

function applyPaintedFormat() {
  if (!paintedFormat) return;
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return;

  document.execCommand('removeFormat', false, null);
  if (paintedFormat.bold) document.execCommand('bold', false, null);
  if (paintedFormat.italic) document.execCommand('italic', false, null);
  if (paintedFormat.underline) document.execCommand('underline', false, null);
  if (paintedFormat.strike) document.execCommand('strikeThrough', false, null);
  if (paintedFormat.color) document.execCommand('foreColor', false, paintedFormat.color);
  if (paintedFormat.fontSize) setFontSize(paintedFormat.fontSize);

  cancelFormatPainter();
  scheduleChange();
}

function _maybeApplyFormatPainter() {
  if (!paintedFormat) return;
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed && editor.contains(sel.anchorNode)) {
    applyPaintedFormat();
  }
}
editor.addEventListener('mouseup', _maybeApplyFormatPainter);
editor.addEventListener('keyup', function(e) {
  if (e.shiftKey) _maybeApplyFormatPainter();
});
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && paintedFormat) cancelFormatPainter();
});

function requestLink() {
  _flutterNotify('onLinkRequest');
}

function requestAttach() {
  _flutterNotify('onAttachRequest');
}

function insertLink(url) {
  editor.focus();
  document.execCommand('createLink', false, url);
  scheduleChange();
}

function scheduleChange() {
  clearTimeout(changeTimer);
  changeTimer = setTimeout(fireChange, 300);
}

// Serialising editor.innerHTML is O(DOM size) — with a large quoted reply
// body this can block the main thread for a while. Defer it to an idle
// slot so it doesn't compete with the next keystroke if the user resumes
// typing right as the debounce timer fires.
function _cleanHtml() {
  return editor.innerHTML.replace(/​/g, '');
}

function fireChange() {
  if (window.requestIdleCallback) {
    requestIdleCallback(function() {
      _flutterNotify('onContentChanged', _cleanHtml());
    }, {timeout: 500});
  } else {
    _flutterNotify('onContentChanged', _cleanHtml());
  }
}

function setContent(html) {
  editor.innerHTML = html;
  const range = document.createRange();
  const sel = window.getSelection();
  if (editor.firstChild) {
    range.setStart(editor, 0);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function getContent() {
  return _cleanHtml();
}

function focusEditor() {
  editor.focus();
  const sel = window.getSelection();
  if (sel.rangeCount === 0 || !_rangeInEditor(sel.getRangeAt(0))) {
    const range = document.createRange();
    if (editor.firstChild) {
      range.setStart(editor, 0);
    } else {
      range.selectNodeContents(editor);
    }
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function insertImage(dataUri, contentId) {
  editor.focus();
  const img = document.createElement('img');
  img.src = dataUri;
  img.setAttribute('data-cid', contentId);
  img.style.maxWidth = '100%';
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(img);
    range.setStartAfter(img);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  } else {
    editor.appendChild(img);
  }
  scheduleChange();
}

// --- Caret-tracked insertion (used for streaming AI drafts) ----------------
var savedRange = null;

function _rangeInEditor(range) {
  return range && editor.contains(range.commonAncestorContainer);
}

// Keep savedRange current as the caret moves inside the editor, so it survives
// the editor losing focus (e.g. when the AI prompt dialog opens).
document.addEventListener('selectionchange', function() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const r = sel.getRangeAt(0);
    if (_rangeInEditor(r)) savedRange = r.cloneRange();
  }
});

// Explicit snapshot; returns true if a caret inside the editor was captured.
function saveSelection() {
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    const r = sel.getRangeAt(0);
    if (_rangeInEditor(r)) { savedRange = r.cloneRange(); return true; }
  }
  return false;
}

function _endOfEditorRange() {
  const r = document.createRange();
  r.selectNodeContents(editor);
  r.collapse(false);
  return r;
}

// Inserts text at the saved caret (or the end of the editor as a fallback),
// converting newlines to <br>, and advances the saved caret past it. Does not
// reset the user's selection or rewrite innerHTML, so streaming stays smooth.
function insertAtSaved(text) {
  if (!text) return;
  let range = (savedRange && _rangeInEditor(savedRange))
      ? savedRange
      : _endOfEditorRange();
  range.deleteContents();

  const frag = document.createDocumentFragment();
  const parts = String(text).split('\n');
  for (let i = 0; i < parts.length; i++) {
    if (i > 0) frag.appendChild(document.createElement('br'));
    if (parts[i]) frag.appendChild(document.createTextNode(parts[i]));
  }
  const lastNode = frag.lastChild;
  range.insertNode(frag);
  if (lastNode) {
    range.setStartAfter(lastNode);
    range.collapse(true);
  }
  savedRange = range.cloneRange();
  scheduleChange();
}

function _checkOrdinalSuffix() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return;
  const range = sel.getRangeAt(0);
  if (!range.collapsed) return;

  const node = range.startContainer;
  const offset = range.startOffset;
  if (node.nodeType !== Node.TEXT_NODE || offset < 3) return;
  if (node.parentElement && node.parentElement.tagName === 'SUP') return;

  const textBefore = node.textContent.slice(0, offset);
  if (!/\d(st|nd|rd|th)$/.test(textBefore)) return;

  // Split: node → beforeSuffix, suffix → supText, text after cursor → afterNode
  const afterNode = node.splitText(offset);
  const supText   = node.splitText(offset - 2);

  const sup = document.createElement('sup');
  node.parentNode.insertBefore(sup, afterNode);
  sup.appendChild(supText);

  // WebKit inherits the superscript "typing attributes" from the character
  // immediately before the cursor. Inserting a zero-width space into afterNode
  // gives WebKit a non-superscript character to the left of the cursor, so the
  // next typed character is rendered in normal (baseline) text. The ZWS is
  // stripped from HTML output in fireChange/getContent so it never reaches the
  // email body.
  afterNode.textContent = '​' + afterNode.textContent;
  const newRange = document.createRange();
  newRange.setStart(afterNode, 1); // after the ZWS, outside <sup>
  newRange.collapse(true);
  sel.removeAllRanges();
  sel.addRange(newRange);

  scheduleChange();
}

editor.addEventListener('input', function() {
  _checkOrdinalSuffix();
  scheduleChange();
});

editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertHTML', false, '    ');
    scheduleChange();
  }

  if (e.key === ' ') {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return;

    const node = range.startContainer;
    const offset = range.startOffset;
    if (node.nodeType !== Node.TEXT_NODE || offset < 1) return;

    // Only trigger when the text before the cursor is exactly '-'
    if (node.textContent.slice(0, offset) !== '-') return;

    // Find the containing block (P, DIV, LI, BLOCKQUOTE, or the editor itself)
    let block = node.parentElement;
    while (block && block !== editor &&
           !['P','DIV','LI','BLOCKQUOTE'].includes(block.tagName)) {
      block = block.parentElement;
    }
    const searchRoot = (block && block !== editor) ? block : editor;

    // Confirm nothing precedes this text node in the block
    let textBeforeNode = '';
    const walker = document.createTreeWalker(searchRoot, NodeFilter.SHOW_TEXT);
    let t;
    while ((t = walker.nextNode()) !== null) {
      if (t === node) break;
      textBeforeNode += t.textContent;
    }
    if (textBeforeNode !== '') return;

    e.preventDefault();
    // Select and delete the '-' character
    const delRange = document.createRange();
    delRange.setStart(node, 0);
    delRange.setEnd(node, 1);
    sel.removeAllRanges();
    sel.addRange(delRange);
    document.execCommand('delete', false, null);
    // Convert the current block into a bullet list item
    document.execCommand('insertUnorderedList', false, null);
    scheduleChange();
  }
});

// Update toolbar button active states and colour swatch on selection change.
// document.queryCommandState()/queryCommandValue() do synchronous style
// computation that scales with DOM size/complexity, and selectionchange
// fires on every keystroke (typing moves the caret). With a large quoted
// reply body in the editor, calling these unthrottled froze the UI while
// typing. Coalesce to at most once per animation frame instead.
let toolbarUpdateScheduled = false;
function updateToolbarState() {
  toolbarUpdateScheduled = false;
  ['bold','italic','underline','strikeThrough'].forEach(function(cmd) {
    const id = {'bold':'btn-bold','italic':'btn-italic','underline':'btn-underline','strikeThrough':'btn-strike'}[cmd];
    const btn = document.getElementById(id);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });

  // Reflect the foreground colour at the cursor in the swatch
  const raw = document.queryCommandValue('foreColor');
  if (raw) {
    const hex = cssColorToHex(raw);
    if (hex) {
      colorSwatch.style.background = hex;
      colorInput.value = hex;
    }
  }

  updateFontSizeSelect();
}
document.addEventListener('selectionchange', function() {
  if (toolbarUpdateScheduled) return;
  toolbarUpdateScheduled = true;
  requestAnimationFrame(updateToolbarState);
});

// Converts CSS rgb(...) or #rrggbb strings returned by queryCommandValue to #rrggbb
function cssColorToHex(color) {
  const m = color.match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/);
  if (m) {
    return '#' + [m[1], m[2], m[3]]
      .map(n => parseInt(n, 10).toString(16).padStart(2, '0'))
      .join('');
  }
  if (/^#[0-9a-fA-F]{6}$/.test(color)) return color;
  return null;
}
</script>
</body>
</html>
