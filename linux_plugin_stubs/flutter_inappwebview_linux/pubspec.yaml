name: flutter_inappwebview_linux
version: 0.1.0-beta.1
description: No-op stub — Linux WebView is provided by webview_flutter instead.
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    implements: flutter_inappwebview
    platforms:
      linux:
        pluginClass: FlutterInappwebviewLinuxPlugin
