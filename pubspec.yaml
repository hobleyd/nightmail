name: nightmail
description: "A cross-platform email client for Office 365, Gmail & IMAP."
publish_to: 'none'

version: 1.11.0+8

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.1.0

  # Functional programming (Either type for error handling)
  fpdart: ^1.1.1

  # HTTP client
  dio: ^5.10.0

  # Dependency injection
  get_it: ^9.2.1

  # OAuth2 / PKCE authentication (works on web, desktop, mobile)
  flutter_web_auth_2: ^5.0.3

  # Secure token storage
  flutter_secure_storage: ^10.3.1

  # Crypto for PKCE code challenge generation
  crypto: ^3.0.6

  # UUID generation
  uuid: ^4.5.1

  # App version info
  package_info_plus: ^10.2.0
  webview_flutter: ^4.14.1
  html_view:
    path: packages/html_view
  intl: ^0.20.3

  # AI chat surface (streaming markdown chat UI for the AI day panel)
  flutter_gen_ai_chat_ui: ^2.15.0
  path_provider: ^2.1.5
  open_file: ^4.0.0
  file_selector: ^1.1.0
  share_plus: ^13.2.0
  enough_mail: ^2.1.7
  drift: ^2.34.1
  drift_flutter: ^0.3.1
  cryptography: ^2.7.0
  desktop_multi_window: ^0.3.0
  window_manager: ^0.5.2
  screen_retriever: ^0.2.2
  url_launcher: ^6.3.2
  app_links: ^7.2.1
  caldav: ^1.5.0
  desktop_drop: ^0.7.1

  # Background task scheduling (survives app sleep on mobile)
  workmanager: ^0.9.0+3

  # Cross-platform local notifications (Linux/Windows/Android/iOS)
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1

  # Printing support
  printing: ^5.13.1
  pdf: ^3.11.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.7.0
  build_runner: ^2.15.1
  drift_dev: ^2.34.3
  flutter_launcher_icons: ^0.14.3
  innosetup: ^0.1.3
  path_provider_platform_interface: any
  plugin_platform_interface: any

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/sharpblue.png
    - assets/editor/editor.html
    - assets/docviewer/jszip.min.js
    - assets/docviewer/docx-preview.min.js
    - assets/docviewer/xlsx.full.min.js

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  image_path: "assets/logo.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  linux:
    generate: true
    image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0a0a2e"
    theme_color: "#0a0a2e"

dependency_overrides:
  # Local patch: fixes StatusParser regex to handle unquoted atom mailbox names
  # (e.g. Dovecot returns "STATUS INBOX ..." not "STATUS \"INBOX\" ...").
  # Remove once upstream enough_mail releases a fix.
  enough_mail:
    path: packages/enough_mail
