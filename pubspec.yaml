name: nightmail
description: "A cross-platform email client for Office 365 via Microsoft Graph API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Functional programming (Either type for error handling)
  fpdart: ^1.1.1

  # HTTP client
  dio: ^5.8.0

  # Dependency injection
  get_it: ^8.0.3

  # OAuth2 / PKCE authentication (works on web, desktop, mobile)
  flutter_web_auth_2: ^4.0.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Crypto for PKCE code challenge generation
  crypto: ^3.0.6

  # UUID generation
  uuid: ^4.5.1
  flutter_widget_from_html: ^0.17.2
  webview_flutter: ^4.0.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  open_file: ^3.5.5
  file_selector: ^1.1.0
  share_plus: ^12.0.2
  enough_mail: ^2.1.7
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  cryptography: ^2.7.0
  desktop_multi_window: ^0.3.0
  window_manager: ^0.5.1
  url_launcher: ^6.3.2
  flutter_contacts: ^1.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.14.3
  innosetup: ^0.1.3
  path_provider_platform_interface: any
  plugin_platform_interface: any

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/logo.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  image_path: "assets/logo.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  linux:
    generate: true
    image_path: "assets/logo.png"
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0a0a2e"
    theme_color: "#0a0a2e"

dependency_overrides:
  # Local patch: fixes StatusParser regex to handle unquoted atom mailbox names
  # (e.g. Dovecot returns "STATUS INBOX ..." not "STATUS \"INBOX\" ...").
  # Remove once upstream enough_mail releases a fix.
  enough_mail:
    path: packages/enough_mail
